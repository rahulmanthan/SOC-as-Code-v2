title: Indicator Removal - Timestomp via PowerShell
id: f2b7d6e8-4a9c-4f3d-ad1b-0c7f8d2e6b4a
status: experimental
description: >
  Detects PowerShell commands that modify file timestamps (CreationTime,
  LastWriteTime, LastAccessTime) using Set-ItemProperty or direct .NET
  property assignment. Adversaries use timestomping to make dropped tools
  and payloads blend in with legitimate system files by backdating their
  timestamps, evading forensic timeline analysis and file-based hunting.
  Common patterns:
    (Get-Item file.exe).CreationTime = "01/01/2020 00:00:00"
    Set-ItemProperty -Path file.exe -Name CreationTime -Value "01/01/2020"
references:
  - https://attack.mitre.org/techniques/T1070/006/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1070.006/T1070.006.md
author: Rahul Kumar Manthan
date: 2026-06-24
tags:
  - attack.defense_evasion
  - attack.t1070.006
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_timestomp:
    CommandLine|contains:
      - 'CreationTime'
      - 'LastWriteTime'
      - 'LastAccessTime'
      - 'SetCreationTime'
      - 'SetLastWriteTime'
      - 'SetLastAccessTime'
  condition: selection_image and selection_timestomp
falsepositives:
  - Build scripts or deployment automation that intentionally sets file
    timestamps for versioning or cache-busting purposes. Uncommon but
    possible in CI/CD pipelines that run on Windows.
level: high

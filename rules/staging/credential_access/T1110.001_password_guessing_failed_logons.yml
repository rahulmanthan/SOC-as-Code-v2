title: Multiple Failed Logon Attempts Against Single Account (Password Guessing)
id: 3c8e2f1a-7d4b-4f9c-8e2a-1b6c9d4e7f2a
status: experimental
description: >
  Detects repeated failed logon attempts against a single account within a
  short time window, consistent with password guessing or brute-force activity
  (T1110.001). Unlike single-event detections, this rule uses a count-based
  threshold: five or more 4625 (failed logon) events targeting the same account
  within a 5-minute bucket triggers an alert.

  Key SubStatus codes for triage:
    0xc000006a - correct username, wrong password (higher priority)
    0xc0000064 - username does not exist (may indicate username enumeration)
    0xc0000234 - account locked out (guessing already succeeded in locking)

  LogonType 2 = interactive, 3 = network (SMB/net use), 10 = remote interactive.
  Network logon (type 3) with repeated failures is the classic password spray pattern.
references:
  - https://attack.mitre.org/techniques/T1110/001/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1110.001/T1110.001.md
  - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4625
author: Rahul Kumar Manthan
date: 2026-06-24
tags:
  - attack.credential_access
  - attack.t1110.001
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4625
  filter_machine_accounts:
    TargetUserName|endswith: '$'
  filter_system_accounts:
    TargetUserName:
      - 'ANONYMOUS LOGON'
      - '-'
      - ''
  condition: selection and not filter_machine_accounts and not filter_system_accounts
  timeframe: 5m
  condition_aggregate: count() >= 5
falsepositives:
  - Legitimate users mistyping their password repeatedly (expect 1-3 failures,
    not 5+ in a 5-minute window).
  - Automated service accounts with stale cached credentials after a password
    rotation — these typically generate a sustained, regular pattern rather than
    a burst. Allowlist known service account names once identified in the environment.
  - Security scanners or vulnerability assessment tools performing authentication
    testing — allowlist by source IP if using a dedicated scan host.
level: medium
---
# SPL EQUIVALENT (for direct Splunk use since pySigma aggregate conditions
# compile differently depending on backend version):
#
# sourcetype="XmlWinEventLog:Security" EventCode=4625
# | rex field=_raw "TargetUserName>(?<TargetUserName>[^<]+)"
# | where TargetUserName != "-" AND NOT match(TargetUserName, "\\$$")
# | bucket _time span=5m
# | stats count by _time, TargetUserName, host
# | where count >= 5
#
# This SPL is what the validate_rule.py pipeline runs against Splunk directly.